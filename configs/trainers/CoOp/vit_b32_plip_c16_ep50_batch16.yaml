DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 16
  TEST:
    BATCH_SIZE: 100
  NUM_WORKERS: 8

INPUT:
  SIZE: (224, 224)
  INTERPOLATION: "bicubic"
  PIXEL_MEAN: [0.48145466, 0.4578275, 0.40821073]
  PIXEL_STD: [0.26862954, 0.26130258, 0.27577711]
  TRANSFORMS: ["random_resized_crop", "random_flip", "normalize"]

OPTIM:
  NAME: "sgd"
  LR: 0.002  # 0.0002 # 0.002
  MAX_EPOCH: 50  #200
  LR_SCHEDULER: "cosine"
  WARMUP_EPOCH: 1
  WARMUP_TYPE: "constant"
  WARMUP_CONS_LR: 1e-5

TRAIN:
  PRINT_FREQ: 5

MODEL:
  BACKBONE:
    NAME: "ViT-B/32"
    
TRAINER:
  COOP:
    N_CTX: 16
    CTX_INIT: ""
    PREC: "fp16" # Use "fp32" only for ECCV_PENALTY and ECCV_ZS or else use "fp16" for all other losses
    LOSS:
      # CalibPrompt (paper default): Label Smoothing (LS) base loss + SMAC + AS regularizers.
      # To reproduce baselines, set this to a single loss, e.g. ['CE'], ['LS'], ['FL'], ['LOGITNORM'], etc.
      ENABLED_LOSSES: ['LS', 'SMAC', 'AS']
      CE:
        WEIGHT: 1.0
      DCA:
        WEIGHT: 1.0  #15.0
      MDCA:
        WEIGHT: 1.0
      FL:
        WEIGHT: 1.0
        GAMMA: 3.0  # Control Focus
      LS:
        WEIGHT: 1.0
        ALPHA: 0.05  # Control smoothing (histopathology)
      MMCE:
        WEIGHT: 2.0
      AS:
        WEIGHT: 0.01
      SMAC:
        WEIGHT: 1.0
        ALPHA: 0.05
      ECCV_PENALTY:
        WEIGHT: 1.0
      ECCV_ZS:
        WEIGHT: 1.0
      MBLS:
        WEIGHT: 1.0    # Default overall weight in the loss combination
        MARGIN: 10.0   # Default margin value from the original implementation
        ALPHA: 0.1     # Default balancing weight from the original implementation
      LOGITNORM:
        WEIGHT: 1.0                  # Overall weight in loss combination
        TEMPERATURE: 1.0             # Temperature parameter (t)
      MARGIN_MEAN_VAR:
        WEIGHT: 1.0
      TEXT_MOMENT_MATCHING:
        WEIGHT: 5.0